<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background: linear-gradient(-45deg, #ffd6e8, #e5d4ff, #c8f7e4);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
    position:relative;
}

/* Animated Gradient */
@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Particles */
canvas{
    position:absolute;
    top:0;
    left:0;
    z-index:0;
}

/* Main Card */
.container{
    position:relative;
    z-index:2;
    text-align:center;
    padding:30px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.25);
    border-radius:25px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    max-width:90%;
    width:400px;
    animation: fadeSlide 1.5s ease forwards;
    opacity:0;
    transform: translateY(40px);
}

@keyframes fadeSlide{
    to{
        opacity:1;
        transform: translateY(0);
    }
}

.container img{
    width:100%;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    margin-bottom:20px;
}

/* Title */
.title{
    font-family: 'Dancing Script', cursive;
    font-size:2rem;
    font-weight:700;
    background: linear-gradient(90deg, #ff7eb9, #b388ff, #3ddc97);
    background-size:200% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: shine 3s linear infinite;
}

@keyframes shine{
    to{ background-position:200% center; }
}

.message{
    margin-top:15px;
    font-size:1rem;
    color:#333;
    line-height:1.6;
}

/* Button */
button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ffffffaa;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover{
    background:#fff;
    transform:scale(1.05);
}

/* Responsive */
@media(max-width:480px){
    .container{
        width:90%;
        padding:20px;
    }
    .title{
        font-size:1.7rem;
    }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
    <!-- Thay link ảnh bên dưới -->
    <img src="vananh.png">

    <div class="title">Happy Women's Day!</div>

    <div class="message">
        Chúc Vân Ánh 8/3 vui vẻ :33
    </div>

    <button onclick="launchConfetti()">Bấm vào đây để nhận điều bất ngờ</button>
</div>

<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
/* Particle Background */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle{
    constructor(){
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speedY = Math.random() * 0.5 + 0.2;
    }
    update(){
        this.y += this.speedY;
        if(this.y > canvas.height) this.y = 0;
    }
    draw(){
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

for(let i=0;i<120;i++){
    particlesArray.push(new Particle());
}

function animateParticles(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particlesArray.forEach(p=>{
        p.update();
        p.draw();
    });
    requestAnimationFrame(animateParticles);
}
animateParticles();

/* Confetti */
function launchConfetti(){
    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });
}

/* Resize */
window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

<audio id="bgMusic" autoplay loop >
    <source src="music.mp3">
</audio>

<script>
window.addEventListener("load", function() {
    const music = document.getElementById("bgMusic");

    // thử bỏ mute và phát lại
    music.muted = false;
    const playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise.catch(() => {
            // nếu bị chặn thì vẫn giữ nguyên (trình duyệt yêu cầu tương tác)
        });
    }
});
</script>

</body>
</html>
