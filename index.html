<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quà 8/3</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root{
  --sage:#9CAF88;
  --pink:#f8c8dc;
  --cream:#fdf6ee;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:var(--cream);
  overflow-x:hidden;
}

/* INTRO */
.intro{
  position:fixed;
  inset:0;
  background:var(--cream);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  transition:opacity .8s ease, visibility .8s ease;
}

.intro.hidden{
  opacity:0;
  visibility:hidden;
}

.open-btn{
  padding:16px 32px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.4);
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,.25);
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  cursor:pointer;
  font-size:16px;
}

/* MAIN */
.main{
  opacity:0;
  transition:opacity 1s ease;
  padding:70px 16px;
  text-align:center;
}

.main.show{opacity:1}

h1{
  font-family:'Playfair Display',serif;
  font-size:28px;
  color:var(--sage);
  margin-bottom:30px;
}

/* POLAROID */
.gallery{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:16px;
  margin-bottom:50px;
}

.polaroid{
  background:#fff;
  padding:8px 8px 20px;
  width:42%;
  max-width:220px;
  box-shadow:0 6px 15px rgba(0,0,0,.12);
  transform:rotate(-2deg);
  transition:.3s;
}

.polaroid:nth-child(even){
  transform:rotate(3deg);
}

.polaroid img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* MESSAGE */
.message-box{
  max-width:680px;
  margin:auto;
  background:rgba(255,255,255,.6);
  padding:24px;
  border-radius:18px;
  backdrop-filter:blur(8px);
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  font-size:16px;
  line-height:1.6;
  min-height:120px;
}

/* PETAL */
.petal{
  position:fixed;
  top:-20px;
  width:12px;
  height:12px;
  background:var(--pink);
  border-radius:50%;
  pointer-events:none;
  animation:fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(100vh) rotate(360deg);
  }
}

@media(min-width:768px){
  .polaroid{width:220px}
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
<button class="open-btn" id="openBtn">
Cậu có một món quà, mở ra nhé!
</button>
</div>

<!-- NHẠC NỀN -->
<audio id="bgMusic" loop>
<!-- THAY LINK NHẠC MP3 TẠI ĐÂY -->
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- MAIN -->
<div class="main" id="mainContent">

<h1>Gửi <!-- THAY TÊN TẠI ĐÂY --> Vân Ánh 💐</h1>

<div class="gallery">

<!-- THAY LINK ẢNH TẠI ĐÂY -->
<div class="polaroid">
<img loading="lazy" src="vananh.png">
</div>

</div>

<div class="message-box" id="typewriter"></div>

</div>

<script>

const intro = document.getElementById("intro");
const openBtn = document.getElementById("openBtn");
const mainContent = document.getElementById("mainContent");
const music = document.getElementById("bgMusic");
const typewriterEl = document.getElementById("typewriter");

/* SỬA LỜI CHÚC TẠI ĐÂY */
const message = `
Chúc Vân Ánh một ngày 8/3 thật rực rỡ.

Cảm ơn vì đã luôn đồng hành,
vừa dịu dàng vừa mạnh mẽ theo cách rất riêng.

Mong Vân Ánh luôn tự tin,
được yêu thương
và sống đúng với phiên bản tuyệt nhất của mình.
`;

/* TYPEWRITER */
function typeWriter(text, element){
let i=0;
function typing(){
if(i<text.length){
element.textContent+=text[i];
i++;
setTimeout(typing,35);
}
}
typing();
}

/* CONFETTI */
function launchConfetti(){

const duration=1200;
const end=Date.now()+duration;

(function frame(){

confetti({
particleCount:18,
spread:60,
origin:{x:Math.random()}
});

if(Date.now()<end){
requestAnimationFrame(frame);
}

})();

}

/* PETAL */
let petalInterval;

function createPetal(){

const petal=document.createElement("div");

petal.className="petal";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(6+Math.random()*4)+"s";

document.body.appendChild(petal);

setTimeout(()=>petal.remove(),10000);

}

/* CLICK MỞ QUÀ */
openBtn.addEventListener("click",()=>{

intro.classList.add("hidden");
mainContent.classList.add("show");

/* phát nhạc */
music.play();

/* confetti */
launchConfetti();

/* chữ chạy */
typeWriter(message,typewriterEl);

/* hoa rơi */
petalInterval=setInterval(createPetal,700);

});

</script>

</body>
</html>
